<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview · 企业题库</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --text:#0f172a;
      --sub:#64748b;
      --line:#e5eaf2;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --soft:#eef3fb;
    }

    :root[data-theme="dark"]{
      --bg:#0b1220;
      --panel:#0f172a;
      --text:#e2e8f0;
      --sub:#94a3b8;
      --line:#1e293b;
      --primary:#3b82f6;
      --primary-hover:#2563eb;
      --soft:#111c31;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed; inset:0;
      background:url('../assets/images/noise.svg') repeat;
      opacity:.04; pointer-events:none; z-index:0;
    }

    .layout{
      position:relative; z-index:1;
      display:grid; grid-template-columns:240px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:var(--panel);
      border-right:1px solid var(--line);
      padding:22px 16px;
      position:sticky; top:0; height:100vh;
    }
    .logo{
      display:flex;align-items:center;gap:10px;
      padding:8px 10px 18px;border-bottom:1px solid var(--line);margin-bottom:14px;
    }
    .logo-badge{
      width:34px;height:34px;border-radius:10px;
      background: linear-gradient(135deg,#1d4ed8,#0ea5e9);
      position: relative; flex-shrink: 0;
    }
    .logo-badge::before{
      content:"";position:absolute; inset:8px;
      border:2px solid rgba(255,255,255,.92);border-radius:6px;
    }
    .logo-badge::after{
      content:"";position:absolute; left:16px; top:9px; bottom:9px;
      width:2px; background:rgba(255,255,255,.92);
    }
    .logo h2{margin:0;font-size:16px;line-height:1.2}
    .logo p{margin:2px 0 0;color:var(--sub);font-size:12px}

    .menu{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
    .menu a{
      text-decoration:none;color:var(--text);
      padding:10px 12px;border-radius:10px;font-size:14px;
      display:flex;align-items:center;gap:8px;
    }
    .menu a:hover{background:#f1f5f9}
    .menu a.active{background:#eaf1ff;color:#1d4ed8;font-weight:600;}
    :root[data-theme="dark"] .menu a:hover{background:#111c31}
    :root[data-theme="dark"] .menu a.active{background:#1b2b4a;color:#93c5fd}

    .icon{width:16px;height:16px;display:inline-block;vertical-align:-2px;flex-shrink:0;}

    .main{padding:20px 24px 28px;}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:14px;gap:10px;flex-wrap:wrap;
    }
    .topbar h1{margin:0;font-size:22px;font-weight:700;}
    .topbar .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

    .btn{
      border:none;border-radius:10px;height:40px;padding:0 14px;
      font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    }
    .btn.primary{background:var(--primary);color:#fff;}
    .btn.primary:hover{background:var(--primary-hover);}
    .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text);}

    .select,.input{
      height:40px;border:1px solid var(--line);background:var(--panel);
      color:var(--text);border-radius:10px;padding:0 10px;font-size:14px;outline:none;
    }
    .input{min-width:260px;}

    .toolbar{
      display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;
      background:var(--panel); border:1px solid var(--line);
      border-radius:14px; padding:12px;
    }

    .summary{
      font-size:13px;color:var(--sub);margin-bottom:10px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }

    .bank-card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      display:flex; align-items:center; gap:12px;
      min-height:92px;
      transition:.18s ease;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(15,23,42,.03);
    }
    .bank-card:hover{
      transform:translateY(-2px);
      border-color:#cddbf9;
      box-shadow:0 10px 24px rgba(37,99,235,.12);
    }
    :root[data-theme="dark"] .bank-card:hover{
      border-color:#334a74;
      box-shadow:0 10px 24px rgba(8,47,134,.35);
    }

    .logo-mini{
      width:52px;height:52px;border-radius:12px;
      border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:13px;
      flex-shrink:0;background:var(--soft);
      overflow:hidden;
    }

    /* When using real logo images, keep the badge background pure white for consistency. */
    .logo-mini.has-img{ background:#fff; }

    .logo-mini img{
      width:80%;
      height:80%;
      object-fit:contain;
      display:block;
    }

    .meta{min-width:0}
    .title{
      font-size:22px;
      margin:0 0 6px;
      line-height:1.3;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .sub{
      font-size:13px;color:var(--sub);
    }

    .empty{
      background:var(--panel);
      border:1px dashed var(--line);
      border-radius:14px;
      padding:26px;
      text-align:center;
      color:var(--sub);
      grid-column:1/-1;
    }

    @media (max-width:1200px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    }
    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
      .sidebar{display:none}
      .grid{grid-template-columns:1fr}
      .input{min-width:unset; width:100%;}
      .toolbar > *{flex:1 1 180px;}
    }
  </style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;left:-9999px;top:-9999px;">
  <symbol id="i-dashboard" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="5" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="10" width="8" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="13" width="8" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
  <symbol id="i-bank" viewBox="0 0 24 24"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H20v14H6.5A2.5 2.5 0 1 0 6.5 23H20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M6.5 4A2.5 2.5 0 0 0 4 6.5v14A2.5 2.5 0 0 1 6.5 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="9" y1="8" x2="16" y2="8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="9" y1="11.5" x2="16" y2="11.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
  <symbol id="i-interview" viewBox="0 0 24 24"><path d="M4 5.5h10a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H9l-4 3v-3H4a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 8.5h6a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-1v2.5l-3-2.5h-2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></symbol>
  <symbol id="i-report" viewBox="0 0 24 24"><path d="M4 20V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14" fill="none" stroke="currentColor" stroke-width="1.8"/><polyline points="7,15 11,11 14,13 18,9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><line x1="7" y1="20" x2="20" y2="20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
</svg>

<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-badge"></div>
      <div>
        <h2>Interview</h2>
        <p data-i18n="brand.sub">面试训练平台</p>
      </div>
    </div>
    <nav class="menu">
      <a href="../index.html"><svg class="icon"><use href="#i-dashboard"></use></svg><span data-i18n="menu.overview">总览</span></a>
      <a class="active" href="./question-bank.html"><svg class="icon"><use href="#i-bank"></use></svg><span data-i18n="menu.bank">面试题库</span></a>
      <a href="./ai-interview.html"><svg class="icon"><use href="#i-interview"></use></svg><span data-i18n="menu.ai">AI面试模拟</span></a>
      <a href="./recent-report.html"><svg class="icon"><use href="#i-report"></use></svg><span data-i18n="menu.report">成绩与评价</span></a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 data-i18n="title">企业题库</h1>
      <div class="right">
        <select id="langSelect" class="select">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
        <button id="themeToggle" class="btn ghost"><span id="themeToggleText">深色模式</span></button>
        <button class="btn primary" onclick="location.href='./ai-interview.html'">
          <span data-i18n="startMock">开始模拟面试</span>
        </button>
      </div>
    </div>

    <div class="toolbar">
      <input id="searchInput" class="input" data-i18n-placeholder="searchPh" placeholder="搜索公司 / 岗位 / 关键词" />
      <select id="roleFilter" class="select">
        <option value="all" data-i18n="role.all">全部岗位</option>
        <option value="Java" data-i18n="role.java">Java工程师</option>
        <option value="Frontend" data-i18n="role.frontend">前端工程师</option>
        <option value="C++" data-i18n="role.cpp">C++工程师</option>
        <option value="Algorithm" data-i18n="role.algorithm">算法工程师</option>
        <option value="Testing" data-i18n="role.testing">测试工程师</option>
        <option value="Data" data-i18n="role.data">数据分析师</option>
        <option value="Product" data-i18n="role.product">产品经理</option>
        <option value="Ops" data-i18n="role.ops">运营</option>
      </select>
    </div>

    <div id="summary" class="summary"></div>
    <section id="cardGrid" class="grid"></section>
  </main>
</div>

<script>
  const messages = {
    zh:{
      brand:{sub:"面试训练平台"},
      menu:{overview:"总览",bank:"面试题库",ai:"AI面试模拟",report:"成绩与评价"},
      title:"企业题库",
      startMock:"开始模拟面试",
      searchPh:"搜索公司 / 岗位 / 关键词",
      role:{
        all:"全部岗位", java:"Java工程师", frontend:"前端工程师", cpp:"C++工程师",
        algorithm:"算法工程师", testing:"测试工程师", data:"数据分析师", product:"产品经理", ops:"运营"
      },
      countLabel:"题目数",
      summary:"共 {total} 套企业真题，当前展示 {shown} 套",
      empty:"未找到匹配题库，换个关键词试试",
      theme:{toDark:"深色模式", toLight:"浅色模式"}
    },
    en:{
      brand:{sub:"Interview Training Platform"},
      menu:{overview:"Overview",bank:"Question Bank",ai:"AI Mock Interview",report:"Scores & Feedback"},
      title:"Enterprise Question Bank",
      startMock:"Start Mock Interview",
      searchPh:"Search company / role / keyword",
      role:{
        all:"All Roles", java:"Java Engineer", frontend:"Frontend Engineer", cpp:"C++ Engineer",
        algorithm:"Algorithm Engineer", testing:"Testing Engineer", data:"Data Analyst", product:"Product Manager", ops:"Operations"
      },
      countLabel:"Questions",
      summary:"{total} enterprise sets in total, showing {shown}",
      empty:"No matching sets found. Try another keyword.",
      theme:{toDark:"Dark Mode", toLight:"Light Mode"}
    }
  };

  const bankData = [
    { company:"美的", role:"Java", titleZh:"2023美的AI模拟真题1卷", titleEn:"2023 Midea AI Mock Set 1", count:8, logo:"MD" },
    { company:"长鑫存储", role:"Testing", titleZh:"2023长鑫存储AI模拟真题A卷", titleEn:"2023 CXMT AI Mock Set A", count:5, logo:"CX" },
    { company:"阿斯利康", role:"Data", titleZh:"2023阿斯利康AI模拟真题A卷", titleEn:"2023 AstraZeneca AI Mock Set A", count:6, logo:"AZ" },
    { company:"阿里巴巴", role:"Java", titleZh:"阿里巴巴Java工程师AI模拟真题", titleEn:"Alibaba Java Engineer AI Set", count:36, logo:"AL" },
    { company:"字节跳动", role:"Product", titleZh:"字节跳动产品AI模拟真题", titleEn:"ByteDance Product AI Set", count:7, logo:"BD" },
    { company:"字节跳动", role:"Ops", titleZh:"字节跳动运营AI模拟真题", titleEn:"ByteDance Operations AI Set", count:2, logo:"BD" },
    { company:"腾讯", role:"C++", titleZh:"腾讯C++工程师AI模拟真题", titleEn:"Tencent C++ Engineer AI Set", count:55, logo:"TX" },
    { company:"百度", role:"Frontend", titleZh:"百度前端工程师AI模拟真题", titleEn:"Baidu Frontend Engineer AI Set", count:64, logo:"BDU" },
    { company:"西门子", role:"Java", titleZh:"2023电气通用AI模拟真题1卷", titleEn:"2023 Siemens General AI Set 1", count:8, logo:"SM" },
    { company:"通用题库", role:"Java", titleZh:"Java工程师AI模拟真题", titleEn:"Java Engineer AI Set", count:240, logo:"JAVA" },
    { company:"通用题库", role:"C++", titleZh:"C++工程师AI模拟真题", titleEn:"C++ Engineer AI Set", count:232, logo:"C++" },
    { company:"通用题库", role:"Frontend", titleZh:"前端工程师AI模拟真题", titleEn:"Frontend Engineer AI Set", count:243, logo:"FE" },
    { company:"通用题库", role:"Testing", titleZh:"测试工程师AI模拟真题", titleEn:"Testing Engineer AI Set", count:219, logo:"QA" },
    { company:"通用题库", role:"Algorithm", titleZh:"算法工程师AI模拟真题", titleEn:"Algorithm Engineer AI Set", count:214, logo:"ALGO" },
    { company:"通用题库", role:"Data", titleZh:"数据分析师AI模拟真题", titleEn:"Data Analyst AI Set", count:111, logo:"DA" },
    { company:"通用题库", role:"Product", titleZh:"产品AI模拟真题", titleEn:"Product AI Set", count:46, logo:"PM" },
    { company:"美团", role:"Java", titleZh:"美团Java工程师AI模拟真题", titleEn:"Meituan Java Engineer AI Set", count:55, logo:"MT" },
    { company:"华为", role:"Algorithm", titleZh:"华为算法工程师AI模拟真题", titleEn:"Huawei Algorithm Engineer AI Set", count:13, logo:"HW" }
  ];

  const companyColor = {
    "美的":"#e8f3ff","长鑫存储":"#e9f5ff","阿斯利康":"#f6efff","阿里巴巴":"#fff1e8","字节跳动":"#e8fbf8","腾讯":"#ecf9ea",
    "百度":"#eef2ff","西门子":"#e8f8f8","通用题库":"#edf2f7","美团":"#fff8d9","华为":"#ffecec"
  };

  // Only some companies have real logos; others fall back to the text badge (item.logo).
  const companyLogo = {
    "阿里巴巴":"../assets/logo/ali.png",
    "百度":"../assets/logo/baidu.png",
    "字节跳动":"../assets/logo/bytedance.png",
    "华为":"../assets/logo/huawei.png",
    "美团":"../assets/logo/meituan.png",
    "美的":"../assets/logo/midea.png",
    "腾讯":"../assets/logo/tencent.png"
  };

  function getByPath(obj, path){ return path.split('.').reduce((o,k)=>o&&o[k], obj); }

  let currentLang = localStorage.getItem('lang') || 'zh';

  const grid = document.getElementById('cardGrid');
  const summary = document.getElementById('summary');
  const searchInput = document.getElementById('searchInput');
  const roleFilter = document.getElementById('roleFilter');

  function updateThemeBtnText(){
    const theme = document.documentElement.getAttribute('data-theme') || 'light';
    const key = theme === 'light' ? 'theme.toDark' : 'theme.toLight';
    document.getElementById('themeToggleText').textContent = getByPath(messages[currentLang], key);
  }

  function applyTheme(theme){
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    updateThemeBtnText();
  }

  function t(key){ return getByPath(messages[currentLang], key) || key; }

  function renderCards(){
    const keyword = searchInput.value.trim().toLowerCase();
    const role = roleFilter.value;

    const shown = bankData.filter(item=>{
      const title = currentLang === 'zh' ? item.titleZh : item.titleEn;
      const hitKeyword =
        !keyword ||
        item.company.toLowerCase().includes(keyword) ||
        item.role.toLowerCase().includes(keyword) ||
        title.toLowerCase().includes(keyword);
      const hitRole = role === 'all' || item.role === role;
      return hitKeyword && hitRole;
    });

    summary.textContent = t('summary')
      .replace('{total}', bankData.length)
      .replace('{shown}', shown.length);

    if(!shown.length){
      grid.innerHTML = `<div class="empty">${t('empty')}</div>`;
      return;
    }

    grid.innerHTML = shown.map(item=>{
  const title = currentLang === 'zh' ? item.titleZh : item.titleEn;
  const logoSrc = companyLogo[item.company];
  const bg = logoSrc ? '#fff' : (companyColor[item.company] || '#edf2f7');
  const logoHtml = logoSrc
    ? `<img src="${logoSrc}" alt="${item.company} logo" loading="lazy" />`
    : item.logo;
  return `
    <article class="bank-card"
      data-company="${item.company}"
      data-role="${item.role}"
      data-titlezh="${item.titleZh}"
      data-titleen="${item.titleEn}"
      data-count="${item.count}">
      <div class="logo-mini ${logoSrc ? 'has-img' : ''}" style="background:${bg}">${logoHtml}</div>
      <div class="meta">
        <h3 class="title">${title}</h3>
        <div class="sub">${t('countLabel')}: ${item.count}</div>
      </div>
    </article>
  `;
    }).join('');

    document.querySelectorAll('.bank-card').forEach(card=>{
     card.addEventListener('click', ()=>{
    const company = card.dataset.company;
    const role = card.dataset.role;
    const titleZh = card.dataset.titlezh;
    const titleEn = card.dataset.titleen;
    const count = card.dataset.count;

    const url = `./question-practice.html?company=${encodeURIComponent(company)}&role=${encodeURIComponent(role)}&titleZh=${encodeURIComponent(titleZh)}&titleEn=${encodeURIComponent(titleEn)}&count=${encodeURIComponent(count)}`;
    window.location.href = url;
      });
    });
  }

  function applyLanguage(lang){
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

    document.querySelectorAll('[data-i18n]').forEach(el=>{
      const txt = getByPath(messages[lang], el.dataset.i18n);
      if(txt) el.textContent = txt;
    });

    document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
      const txt = getByPath(messages[lang], el.dataset.i18nPlaceholder);
      if(txt) el.setAttribute('placeholder', txt);
    });

    updateThemeBtnText();
    renderCards();
  }

  // init theme
  const savedTheme = localStorage.getItem('theme');
  const preferredDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(savedTheme || (preferredDark ? 'dark' : 'light'));

  // events
  const langSelect = document.getElementById('langSelect');
  langSelect.value = currentLang;
  langSelect.addEventListener('change', e => applyLanguage(e.target.value));

  document.getElementById('themeToggle').addEventListener('click', ()=>{
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(cur === 'light' ? 'dark' : 'light');
  });

  searchInput.addEventListener('input', renderCards);
  roleFilter.addEventListener('change', renderCards);

  applyLanguage(currentLang);
</script>
</body>
</html>
