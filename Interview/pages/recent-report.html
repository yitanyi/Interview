<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview · 能力提升反馈</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --text:#0f172a;
      --sub:#64748b;
      --line:#e5eaf2;
      --primary:#2563eb;
      --primary-hover:#1d4ed8;
      --chip:#eef2ff;
      --good:#16a34a;
      --warn:#f59e0b;
      --bad:#ef4444;
    }
    :root[data-theme="dark"]{
      --bg:#0b1220;
      --panel:#0f172a;
      --text:#e2e8f0;
      --sub:#94a3b8;
      --line:#1e293b;
      --primary:#3b82f6;
      --primary-hover:#2563eb;
      --chip:#1b2b4a;
      --good:#22c55e;
      --warn:#fbbf24;
      --bad:#f87171;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      position:relative;
    }
    body::before{
      content:"";
      position:fixed; inset:0;
      background:url('../assets/images/noise.svg') repeat;
      opacity:.04; pointer-events:none; z-index:0;
    }

    .layout{
      position:relative; z-index:1;
      display:grid; grid-template-columns:240px 1fr;
      min-height:100vh;
    }

    /* Sidebar（保持同风格） */
    .sidebar{
      background:var(--panel);
      border-right:1px solid var(--line);
      padding:22px 16px;
      position:sticky; top:0; height:100vh;
    }
    .logo{
      display:flex;align-items:center;gap:10px;
      padding:8px 10px 18px;border-bottom:1px solid var(--line);margin-bottom:14px;
    }
    .logo-badge{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,#1d4ed8,#0ea5e9); position:relative; flex-shrink:0;
    }
    .logo-badge::before{
      content:""; position:absolute; inset:8px; border:2px solid rgba(255,255,255,.92); border-radius:6px;
    }
    .logo-badge::after{
      content:""; position:absolute; left:16px; top:9px; bottom:9px; width:2px; background:rgba(255,255,255,.92);
    }
    .logo h2{margin:0;font-size:16px;line-height:1.2}
    .logo p{margin:2px 0 0;color:var(--sub);font-size:12px}

    .menu{display:flex;flex-direction:column;gap:6px;margin-top:8px}
    .menu a{
      text-decoration:none;color:var(--text);
      padding:10px 12px;border-radius:10px;font-size:14px;
      display:flex;align-items:center;gap:8px;
    }
    .menu a:hover{background:#f1f5f9}
    .menu a.active{background:#eaf1ff;color:#1d4ed8;font-weight:600}
    :root[data-theme="dark"] .menu a:hover{background:#111c31}
    :root[data-theme="dark"] .menu a.active{background:#1b2b4a;color:#93c5fd}
    .icon{width:16px;height:16px;display:inline-block;vertical-align:-2px;flex-shrink:0}

    .main{padding:20px 24px 28px;min-width:0}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .topbar h1{margin:0;font-size:22px}
    .btn{
      border:none;border-radius:10px;height:38px;padding:0 14px;
      font-size:14px;cursor:pointer;background:var(--primary);color:#fff;
    }
    .btn:hover{background:var(--primary-hover)}
    .btn.ghost{
      background:var(--panel);color:var(--text);border:1px solid var(--line);
    }

    /* 二级子页导航 */
    .subnav{
      display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;
    }
    .subtab{
      text-decoration:none;color:var(--sub);
      padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:var(--panel);font-size:13px;
    }
    .subtab.active{
      color:#fff;background:var(--primary);border-color:var(--primary);
    }

    .grid{
      display:grid;grid-template-columns:1.2fr 1fr;gap:12px;
    }
    .panel{
      background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;
      box-shadow:0 4px 12px rgba(15,23,42,.03);
    }
    .panel h3{margin:0 0 10px;font-size:15px}

    .summary{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;
    }
    .metric{
      border:1px solid var(--line);border-radius:10px;padding:10px;background:rgba(37,99,235,.04);
    }
    .metric .k{font-size:12px;color:var(--sub)}
    .metric .v{font-size:24px;font-weight:700;margin-top:4px}
    .up{color:var(--good)} .down{color:var(--bad)}

    .tags{display:flex;gap:8px;flex-wrap:wrap}
    .tag{
      font-size:12px;padding:4px 9px;border-radius:999px;
      background:var(--chip);color:var(--sub);border:1px solid var(--line);
    }
    .tag.bad{color:var(--bad);border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08)}

    .path{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;
    }
    .step{
      border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--panel);
    }
    .step .t{font-weight:600;font-size:13px;margin-bottom:6px}
    .step ul{margin:0;padding-left:16px;color:var(--sub);font-size:13px;line-height:1.55}

    .res-list{display:grid;gap:8px}
    .res-item{
      border:1px dashed var(--line);border-radius:10px;padding:9px 10px;font-size:13px;
      display:flex;justify-content:space-between;gap:10px;align-items:center;
    }
    .res-type{
      font-size:11px;padding:2px 8px;border-radius:999px;background:var(--chip);color:var(--sub);
    }

    .chart-wrap{height:280px;border:1px solid var(--line);border-radius:12px;padding:8px;background:var(--panel)}
    canvas{width:100%;height:100%}

    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
    th{color:var(--sub);font-weight:600}

    .empty{color:var(--sub);font-size:13px;padding:6px 0}

    @media (max-width:1100px){
      .layout{grid-template-columns:1fr}
      .sidebar{display:none}
      .grid{grid-template-columns:1fr}
      .summary,.path{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<script>
(function(){
  // ===== 主题（只读已有 key，不改你原逻辑） =====
  const themeToggle = document.getElementById('themeToggle');
  function applyTheme(theme){
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    themeToggle.textContent = theme === 'dark' ? '浅色模式' : '深色模式';
    drawChart(window.__historyData || []);
  }
  const savedTheme = localStorage.getItem('theme');
  const preferredDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(savedTheme || (preferredDark ? 'dark' : 'light'));
  themeToggle.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(cur === 'light' ? 'dark' : 'light');
  });

  // ===== 你后端没接时用这份兜底数据 =====
  const fallback = {
    history: [
      {date:'2026-02-03', position:'Java后端开发工程师', overall:3.1, dims:{technical:3.0, logic:2.9, communication:3.2}},
      {date:'2026-02-09', position:'Java后端开发工程师', overall:3.4, dims:{technical:3.2, logic:3.3, communication:3.5}},
      {date:'2026-02-17', position:'Java后端开发工程师', overall:3.7, dims:{technical:3.8, logic:3.4, communication:3.8}},
      {date:'2026-02-24', position:'Java后端开发工程师', overall:4.0, dims:{technical:4.1, logic:3.8, communication:4.0}}
    ],
    resources: [
      {title:'Spring 事务传播与隔离级别高频追问', type:'技术知识点', link:'#'},
      {title:'Redis 缓存穿透/击穿/雪崩面试题 20 问', type:'常见面试题', link:'#'},
      {title:'STAR 法则：让回答更有结构', type:'沟通技巧', link:'#'},
      {title:'系统设计：秒杀场景拆解模板', type:'技术知识点', link:'#'},
      {title:'“项目难点”回答示例（可直接套）', type:'沟通技巧', link:'#'}
    ]
  };

async function loadData() {
  const userId = 'anonymous';

  try {
    const historyRes = await fetch(`http://localhost:5000/api/user/history?user_id=${userId}`);
    if (!historyRes.ok) throw new Error('获取历史失败');
    const historyList = await historyRes.json();

    // 转换数据格式：将英文维度映射到前端需要的三个维度
    const history = historyList.map(item => {
      const scores = item.scores || {};
      return {
        date: item.date.slice(0, 10),
        position: item.position || '未知岗位',
        overall: item.overall_score || 0,
        dims: {
          technical: scores.technical_accuracy || 0,
          logic: scores.logic || 0,
          communication: scores.communication || 0
          // 可根据需要增加 depth, fit 等
        }
      };
    });

    // 获取推荐资源（如果有）
    let resources = [];
    if (history.length > 0) {
      try {
        const lastPos = history[history.length - 1].position;
        const recRes = await fetch(`http://localhost:5000/api/recommendations?user_id=${userId}&position=${encodeURIComponent(lastPos)}`);
        if (recRes.ok) {
          resources = await recRes.json();
        } else {
          // 推荐接口失败时使用空数组，不显示兜底数据
          resources = [];
        }
      } catch (e) {
        console.warn('获取推荐资源失败:', e);
        resources = [];
      }
    }

    return { history, resources };
  } catch (err) {
    console.error('加载数据失败', err);
    alert('无法加载历史数据，请检查后端服务。');
    // 返回空数据，不展示硬编码示例
    return { history: [], resources: [] };
  }
}




  function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

function renderSummary(history){
    const box = document.getElementById('summaryBox');
    if(!history || !history.length){
        box.innerHTML = '<div class="empty">暂无数据</div>'; 
        return;
    }
    
    const latest = history[history.length - 1].overall;
    const prev = history.length > 1 ? history[history.length - 2].overall : latest;
    const delta = latest - prev;
    const overallAvg = avg(history.map(i => i.overall));

    box.innerHTML = `
      <div class="metric">
        <div class="k">最近一次评分</div>
        <div class="v">${latest.toFixed(1)}</div>
      </div>
      <div class="metric">
        <div class="k">近阶段平均分</div>
        <div class="v">${overallAvg.toFixed(1)}</div>
      </div>
      <div class="metric">
        <div class="k">较上次变化</div>
        <div class="v ${delta >= 0 ? 'up' : 'down'}">${delta >= 0 ? '+' : ''}${delta.toFixed(1)}</div>
      </div>
    `;
}

function renderWeakness(history){
    const weakTags = document.getElementById('weakTags');
    if(!history || !history.length){ 
        weakTags.innerHTML = '<div class="empty">暂无数据</div>'; 
        return; 
    }

    // 只取最近3次有维度数据的面谈
    const recent = history.slice(-3).filter(h => 
        h.dims && (h.dims.technical > 0 || h.dims.logic > 0 || h.dims.communication > 0)
    );
    
    if (recent.length === 0) {
        weakTags.innerHTML = '<div class="empty">暂无维度数据</div>';
        return;
    }

    const tech = avg(recent.map(i => i.dims.technical));
    const logic = avg(recent.map(i => i.dims.logic));
    const comm = avg(recent.map(i => i.dims.communication));

    const dims = [
        {k:'技术正确性', v:tech},
        {k:'逻辑严谨性', v:logic},
        {k:'沟通表达', v:comm}
    ].sort((a,b) => a.v - b.v);

    // 只显示有值的短板
    const lows = dims.filter(d => d.v > 0).slice(0, 2);
    
    if (lows.length === 0) {
        weakTags.innerHTML = '<div class="empty">暂无维度数据</div>';
        return;
    }
    
    weakTags.innerHTML = lows.map(i => 
        `<span class="tag bad">${i.k}（${i.v.toFixed(1)}）</span>`
    ).join('');
}


  function renderPath(){
    const box = document.getElementById('pathBox');
    box.innerHTML = `
      <div class="step">
        <div class="t">阶段1：补短板（1周）</div>
        <ul>
          <li>每天 30 分钟技术知识点复盘</li>
          <li>完成 5 道高频追问并口述答案</li>
          <li>记录易错点，第二天复述</li>
        </ul>
      </div>
      <div class="step">
        <div class="t">阶段2：强化表达（1周）</div>
        <ul>
          <li>按 STAR 法则改写项目经历</li>
          <li>每天 1 次 3 分钟自我介绍录音</li>
          <li>重点训练“结论先行”表达习惯</li>
        </ul>
      </div>
      <div class="step">
        <div class="t">阶段3：模拟评估（持续）</div>
        <ul>
          <li>每两天完成一次 AI 模拟面试</li>
          <li>对照报告修正薄弱维度</li>
          <li>周末复盘成长曲线与分数变化</li>
        </ul>
      </div>
    `;
  }

  function renderResources(resources){
    const el = document.getElementById('resourceList');
    if(!resources || !resources.length){
      el.innerHTML = '<div class="empty">暂无推荐资源</div>'; return;
    }
    el.innerHTML = resources.map(r=>`
      <a class="res-item" href="${r.link || '#'}" target="_blank" rel="noopener">
        <span>${r.title}</span>
        <span class="res-type">${r.type}</span>
      </a>
    `).join('');
  }

function renderHistory(history){
    const tbody = document.getElementById('historyTbody');
    if(!history || !history.length){
        tbody.innerHTML = `<tr><td colspan="6" class="empty">暂无历史记录</td></tr>`; 
        return; 
    }
    
    tbody.innerHTML = history.slice().reverse().map(i => `
      <tr>
        <td>${i.date || '-'}</td>
        <td>${i.position || '-'}</td>
        <td><strong>${(i.overall || 0).toFixed(1)}</strong></td>
        <td>${((i.dims && i.dims.technical) || 0).toFixed(1)}</td>
        <td>${((i.dims && i.dims.logic) || 0).toFixed(1)}</td>
        <td>${((i.dims && i.dims.communication) || 0).toFixed(1)}</td>
      </tr>
    `).join('');
}

  function drawChart(history){
    const cvs = document.getElementById('trendChart');
    if (!cvs) return;
    
    const ctx = cvs.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = cvs.clientWidth, H = cvs.clientHeight;
    
    if (W === 0 || H === 0) return; // 防止尺寸为0时报错
    
    cvs.width = W * dpr; 
    cvs.height = H * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    const theme = document.documentElement.getAttribute('data-theme');
    const lineColor = getCss('--primary');
    const grid = theme === 'dark' ? '#233047' : '#e5eaf2';
    const text = theme === 'dark' ? '#94a3b8' : '#64748b';

    const pad = {l: 36, r: 12, t: 12, b: 24};
    const w = W - pad.l - pad.r, h = H - pad.t - pad.b;

    // 网格
    ctx.strokeStyle = grid; 
    ctx.lineWidth = 1;
    for(let i = 0; i <= 5; i++){
        const y = pad.t + h * (i / 5);
        ctx.beginPath(); 
        ctx.moveTo(pad.l, y); 
        ctx.lineTo(W - pad.r, y); 
        ctx.stroke();
    }

    // y轴刻度（1~5）
    ctx.fillStyle = text; 
    ctx.font = '12px Inter';
    for(let s = 1; s <= 5; s++){
        const y = pad.t + h * (1 - (s - 1) / 4);
        ctx.fillText(String(s), 10, y + 4);
    }

    if(!history || !history.length){
        ctx.fillText('暂无数据', pad.l + 8, pad.t + 20);
        return;
    }

    const vals = history.map(i => i.overall || 0);
    const n = vals.length;
    const min = 1, max = 5;
    const points = vals.map((v, idx) => ({
        x: pad.l + (n === 1 ? w / 2 : w * (idx / (n - 1))),
        y: pad.t + h * (1 - (v - min) / (max - min))
    }));

    // 线
    ctx.strokeStyle = lineColor; 
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    points.forEach((p, idx) => idx === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();

    // 点 + x 轴日期
    points.forEach((p, idx) => {
        ctx.fillStyle = lineColor;
        ctx.beginPath(); 
        ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); 
        ctx.fill();
        
        ctx.fillStyle = text;
        const label = (history[idx].date || '').slice(5);
        ctx.fillText(label, p.x - 14, H - 6);
    });
}
  function getCss(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  async function init(){
    const data = await loadData();
    const history = data.history || [];
    window.__historyData = history;

    renderSummary(history);
    renderWeakness(history);
    renderPath();
    renderResources(data.resources || []);
    renderHistory(history);
    drawChart(history);
  }

  document.getElementById('refreshBtn').addEventListener('click', init);
  window.addEventListener('resize', () => drawChart(window.__historyData || []));
  init();
})();
</script>
</body>
</html>
