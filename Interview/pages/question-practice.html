<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview · 题集练习</title>
  <style>
    :root{
      --bg:#f5f7fb; --panel:#fff; --text:#0f172a; --sub:#64748b; --line:#e5eaf2;
      --primary:#2563eb; --primary-hover:#1d4ed8; --soft:#eef3fb;
      --ok:#16a34a; --warn:#d97706; --bad:#dc2626;
    }
    :root[data-theme="dark"]{
      --bg:#0b1220; --panel:#0f172a; --text:#e2e8f0; --sub:#94a3b8; --line:#1e293b;
      --primary:#3b82f6; --primary-hover:#2563eb; --soft:#111c31;
      --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    }

    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
    }
    .container{max-width:1100px;margin:0 auto;padding:20px;}
    .topbar,.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .title{margin:0;font-size:22px}
    .sub{color:var(--sub);font-size:13px}
    .btn{
      border:none;border-radius:10px;height:38px;padding:0 14px;font-size:14px;
      cursor:pointer;display:inline-flex;align-items:center;gap:6px
    }
    .btn.primary{background:var(--primary);color:#fff}
    .btn.primary:hover{background:var(--primary-hover)}
    .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text)}
    .btn.sm{height:32px;padding:0 10px;font-size:13px}
    .input,.select{
      height:38px;border:1px solid var(--line);background:var(--panel);color:var(--text);
      border-radius:10px;padding:0 10px;outline:none
    }

    .hero,.toolbar,.list{
      background:var(--panel);border:1px solid var(--line);border-radius:14px
    }
    .hero{padding:14px;margin:12px 0}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{font-size:12px;padding:4px 10px;border-radius:999px;background:var(--soft);color:var(--sub)}

    .tabs{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .tab{
      border:1px solid var(--line);background:var(--panel);color:var(--text);
      border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer
    }
    .tab.active{background:#eaf1ff;color:#1d4ed8;border-color:#cdddff}
    :root[data-theme="dark"] .tab.active{background:#1b2b4a;color:#93c5fd;border-color:#334a74}

    .toolbar{padding:12px;margin-bottom:12px}
    .list{overflow:hidden}
    .item{
      padding:14px;border-bottom:1px dashed var(--line);
      display:flex;justify-content:space-between;gap:12px
    }
    .item:last-child{border-bottom:none}
    .q-title{margin:0 0 6px;font-size:15px;line-height:1.45}
    .meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--sub)}
    .tag{font-size:12px;padding:2px 8px;border-radius:999px;background:var(--soft);color:var(--sub)}
    .status{font-size:12px;padding:2px 8px;border-radius:999px}
    .ok{background:rgba(22,163,74,.12);color:var(--ok)}
    .bad{background:rgba(220,38,38,.12);color:var(--bad)}
    .warn{background:rgba(217,119,6,.12);color:var(--warn)}
    .none{background:rgba(100,116,139,.12);color:var(--sub)}

    .empty{padding:30px;text-align:center;color:var(--sub)}

    .mask{
      position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;
      align-items:center;justify-content:center;padding:16px;z-index:1000
    }
    .modal{
      width:min(760px,100%);max-height:90vh;overflow:auto;
      background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px
    }
    .block{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--soft)}
    .block h4{margin:0 0 8px;font-size:14px}
    .muted{color:var(--sub);font-size:12px}

    @media(max-width:768px){ .item{flex-direction:column} }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1 class="title" id="pageTitle">题集练习</h1>
      <div class="sub">题库练习 / 错题追踪 / 一键再练</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn ghost" onclick="location.href='./question-bank.html'">返回题库</button>
      <button id="themeBtn" class="btn ghost">深色模式</button>
    </div>
  </div>

  <section class="hero">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <label>题集：</label>
      <select id="setSelect" class="select"></select>
    </div>
    <div class="chips">
      <span class="chip" id="cRole">岗位：-</span>
      <span class="chip" id="cCount">题目数：-</span>
      <span class="chip" id="cProgress">完成：0%</span>
    </div>
  </section>

  <div class="tabs">
    <button class="tab active" data-tab="all">当前题集</button>
    <button class="tab" data-tab="wrong">当前题集错题</button>
    <button class="tab" data-tab="cross">跨题集错题本</button>
  </div>

  <section class="toolbar">
    <input id="kw" class="input" placeholder="搜索关键词" />
    <select id="diff" class="select">
      <option value="all">全部难度</option>
      <option value="Easy">简单</option>
      <option value="Medium">中等</option>
      <option value="Hard">困难</option>
    </select>
    <button class="btn primary" id="randomBtn">随机开始</button>
    <button class="btn primary" id="drillBtn">一键再练</button>
    <button class="btn ghost" id="clearSetBtn">清空当前题集记录</button>
  </section>

  <section class="list" id="list"></section>
</div>

<div class="mask" id="qMask">
  <div class="modal">
    <h3 id="qTitle">-</h3>
    <div class="block"><h4>题目描述</h4><div id="qPrompt"></div></div>
    <div class="block"><h4>参考要点</h4><div id="qAnswer"></div></div>
    <div class="muted" id="drillHint"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:10px;">
      <button class="btn sm" style="background:#16a34a;color:#fff" onclick="mark('correct')">答对了</button>
      <button class="btn sm" style="background:#dc2626;color:#fff" onclick="mark('wrong')">答错了</button>
      <button class="btn sm" style="background:#d97706;color:#fff" onclick="mark('unknown')">未掌握</button>
      <button class="btn ghost sm" onclick="closeQ()">关闭</button>
    </div>
  </div>
</div>

<script>
/** -----------------------
 * 1) 接收 question-bank.html 传来的参数
 * ---------------------- */
const query = new URLSearchParams(location.search);
const qCompany = query.get('company') || '通用题库';
const qRole = query.get('role') || '通用';
const qTitleZh = query.get('titleZh') || '题集练习';
const qTitleEn = query.get('titleEn') || 'Question Set';
const qCount = Math.max(5, Math.min(80, Number(query.get('count') || 20)));

function makeQuestions(role, n){
  const base = [
    {difficulty:'Easy', title:'请做一个简短自我介绍，并突出与你申请岗位相关的经历。', answer:'建议按“背景-项目-能力-岗位匹配”结构回答。'},
    {difficulty:'Medium', title:`你在${role}岗位中最有代表性的一个项目是什么？`, answer:'用 STAR（情境-任务-行动-结果）展开，突出量化结果。'},
    {difficulty:'Medium', title:'遇到线上问题时你的排查思路是什么？', answer:'先止损、后定位、再修复、最后复盘。'},
    {difficulty:'Hard', title:'如果需求紧急且资源不足，你如何做取舍？', answer:'按业务价值和风险排序，拆分 MVP，明确里程碑。'},
    {difficulty:'Hard', title:'请讲一个你推动跨团队协作的案例。', answer:'目标对齐、责任边界、同步机制、风险管理。'}
  ];
  return Array.from({length:n}, (_,i)=>{
    const t = base[i % base.length];
    return { id:i+1, difficulty:t.difficulty, title:`[${role}] ${t.title}（${i+1}）`, answer:t.answer };
  });
}

// 判断是否为字节跳动产品AI模拟真题
const isByteDanceProduct = qCompany === '字节跳动' && qRole === 'Product' && qTitleZh.includes('产品AI模拟真题');
// ✅ 新增：如果是算法工程师岗位，使用自定义算法真题（覆盖所有公司）
const isAlgorithmRole = qRole === 'Algorithm';
const isDataAnalystRole = qRole === 'Data' || qRole.includes('数据分析') || qRole.includes('Data Analyst');

let questions;
if (isAlgorithmRole) {
    // 自定义的算法工程师真题，包含各大厂经典题目
    questions = [
        { id: 1, difficulty: 'Medium', title: '请简述逻辑回归的基本原理，并推导其损失函数对参数的梯度。', answer: '逻辑回归假设数据服从伯努利分布，通过sigmoid函数将线性组合映射到[0,1]。损失函数为交叉熵损失。梯度推导：∂L/∂θ = (y_hat - y) * x。具体地，对于单个样本，损失L = -[y log y_hat + (1-y) log (1-y_hat)]，其中y_hat = σ(θ^T x)，则∂L/∂θ = (y_hat - y) x。' },
        { id: 2, difficulty: 'Medium', title: 'LSTM是如何解决传统RNN梯度消失问题的？请结合门结构说明。', answer: 'LSTM通过遗忘门、输入门、输出门控制信息流动。细胞状态c_t可以保持长时记忆，梯度可以通过c_t的加法运算直接传播，避免了反复乘以小权重导致的梯度消失。遗忘门控制历史信息的保留，输入门控制新信息的加入，输出门控制隐藏状态输出。' },
        { id: 3, difficulty: 'Easy', title: '什么是AUC？它有什么物理意义？如何计算？', answer: 'AUC是ROC曲线下的面积，表示随机选择一个正样本和一个负样本，正样本得分高于负样本的概率。计算时，将所有样本按预测得分排序，统计正样本排名高于负样本的对数占比。' },
        { id: 4, difficulty: 'Medium', title: '请描述PCA（主成分分析）的算法步骤，并说明主成分的选取方法。', answer: '步骤：1.数据标准化；2.计算协方差矩阵；3.计算协方差矩阵的特征值和特征向量；4.按特征值降序排列特征向量；5.选择前k个特征向量组成投影矩阵。主成分选取方法：累积方差贡献率（前k个特征值之和占总特征值之和的比例）达到某一阈值（如85%），或根据碎石图拐点。' },
        { id: 5, difficulty: 'Hard', title: '请写出Adaboost算法的伪代码，并解释其工作原理。', answer: '初始化样本权重w_i=1/N。迭代m=1..M：训练弱分类器G_m，计算加权错误率err_m，计算分类器权重α_m=0.5*ln((1-err_m)/err_m)，更新样本权重w_i = w_i * exp(-α_m * y_i * G_m(x_i))，归一化。最终强分类器为G(x)=sign(sum α_m G_m(x))。工作原理：通过调整样本权重，使后续分类器关注之前分错的样本。' },
        { id: 6, difficulty: 'Medium', title: 'Batch Normalization的作用是什么？它在训练和推理阶段有何不同？', answer: '作用：加速收敛、缓解梯度消失、允许更大学习率、有一定正则化效果。训练时使用当前mini-batch的均值和方差进行归一化，并学习缩放和平移参数γ、β。推理时使用全局统计量（移动平均得到的均值和方差）进行归一化，γ、β固定。' },
        { id: 7, difficulty: 'Easy', title: 'ReLU激活函数有什么优缺点？相比于Sigmoid函数，它在哪些方面更优？', answer: '优点：计算简单（max(0,x)）、缓解梯度消失（正区间梯度恒为1）、产生稀疏性。缺点：神经元死亡（负数部分梯度为0）。相比Sigmoid，ReLU无饱和区，梯度不衰减，计算更快。' },
        { id: 8, difficulty: 'Medium', title: 'LeetCode 200：岛屿数量。请描述解题思路，并给出代码（可用伪代码）。', answer: '思路：遍历网格每个格子，若为1则计数加1，并通过DFS或BFS将与之相连的所有1置为0。DFS递归实现，注意边界条件。时间复杂度O(m*n)，空间复杂度O(m*n)（递归栈）。' },
        { id: 9, difficulty: 'Hard', title: '在一个行和列均升序的矩阵中，如何找到第k小的数？请说明算法思路。', answer: '方法一：最小堆。将第一列元素入堆，每次弹出最小值，并将该元素所在行的下一个元素入堆，重复k次。方法二：二分查找。在值域[min, max]内二分，统计矩阵中≤mid的元素个数，若小于k则提高下界，否则降低上界。' },
        { id: 10, difficulty: 'Hard', title: '如何处理海量数据中找出出现频率最高的Top K个元素？请给出方案。', answer: '分治+堆：将数据哈希到多个小文件，每个文件统计词频得到局部Top K，然后合并所有局部Top K到一个堆中，得到全局Top K。也可以使用外部排序+堆，或使用近似算法如Count-Min Sketch。' },
        { id: 11, difficulty: 'Medium', title: '一副扑克牌（大小王各一张，共54张），随机分成三份，求大小王在同一份的概率。', answer: '解法一：先固定大王位置，小王与大王同份的概率为(17/53)，因为大王所在份除大王外还有17张牌的位置，总剩余53张。解法二：组合数计算，分母为54张分成三份的分法数（但注意分法可能涉及有序无序），简化理解即可。' },
        { id: 12, difficulty: 'Medium', title: 'Python中字典的底层数据结构是什么？它如何解决哈希冲突？', answer: 'Python字典基于哈希表实现，采用开放寻址法（open addressing）解决冲突。当发生哈希冲突时，通过二次探测（如(初始位置 + i*i) mod 表长）寻找下一个空闲位置。' },
        { id: 13, difficulty: 'Hard', title: '请解释Transformer模型中Self-Attention的计算过程，并说明为何要使用缩放点积。', answer: '对于输入序列，通过三个线性变换得到Q、K、V。注意力分数 = softmax(QK^T / √d_k) V。缩放因子√d_k是为了防止点积过大导致softmax梯度极小（因为d_k较大时点积方差大）。' },
        { id: 14, difficulty: 'Easy', title: '在训练深度神经网络时，过拟合的常见解决方法有哪些？', answer: '1.增加训练数据；2.正则化（L1/L2）；3.Dropout；4.早停；5.简化模型结构；6.数据增强；7.Batch Normalization（有一定正则化效果）；8.集成学习。' },
        { id: 15, difficulty: 'Medium', title: 'LeetCode 121/122：股票买卖的最佳时机。请说明不同限制条件下的解题思路。', answer: '121（单次交易）：遍历价格，记录历史最低点，计算当前价格与最低点的最大差值。122（无限次交易）：贪心，只要今天价格高于昨天就累加差值。' }
    ];
} else if (isByteDanceProduct) {
    // 自定义的6道字节跳动产品真题，附带参考答案
    questions = [{
      id: 1,
      difficulty: 'Medium',
      title: '为什么转行做产品，你的职业思考是什么？成绩好为什么不继续，而要跨到新领域？',
      answer: '参考答案要点：\n' +
        '1. 阐述对产品工作的理解（例如：产品是技术与商业的结合，能更直接地创造用户价值）；\n' +
        '2. 结合自身背景说明转型原因（例如：技术背景让我更懂实现，但希望通过产品视角解决更大问题）；\n' +
        '3. 强调学习能力和适应力（例如：成绩好说明学习能力强，能快速掌握新领域知识）；\n' +
        '4. 展示对产品工作的热情和长期规划。'
    },
    {
      id: 2,
      difficulty: 'Medium',
      title: '从你的视角看，产品经理岗位最重要的三个能力特质是什么？',
      answer: '参考答案要点：\n' +
        '1. 同理心：能够站在用户角度思考，洞察真实需求；\n' +
        '2. 逻辑思维：能将复杂问题拆解为可执行的方案，梳理业务闭环；\n' +
        '3. 沟通协调：能推动跨团队合作，让研发、设计、运营等达成共识。'
    },
    {
      id: 3,
      difficulty: 'Medium',
      title: '在一个产品从研发洞察到规划设计再到上线的过程中，产品经理最重要的三个职能是什么？',
      answer: '参考答案要点：\n' +
        '1. 需求挖掘与验证：通过用户调研、数据分析等手段找到真实痛点；\n' +
        '2. 方案设计与优先级决策：产出清晰的产品方案，平衡资源与价值，确定迭代节奏；\n' +
        '3. 项目管理与上线跟进：协调各方进度，把控质量，确保产品顺利上线并跟踪效果。'
    },
    {
      id: 4,
      difficulty: 'Medium',
      title: '请介绍一下让你觉得比较有成就感的一段经历，讲一讲这段经历你当时做了一件什么样的事情，你的一个主要职责是什么，然后最后的效果是什么样子的？',
      answer: '参考答案要点：\n' +
        '建议使用STAR法则：\n' +
        '- 情境（Situation）：什么背景，遇到了什么问题；\n' +
        '- 任务（Task）：你的目标是什么，负责什么；\n' +
        '- 行动（Action）：你具体做了什么，如何推动；\n' +
        '- 结果（Result）：取得了哪些量化成果（如用户增长xx%，效率提升xx%）。'
    },
    {
      id: 5,
      difficulty: 'Hard',
      title: '如果要实现AI自动生成SQL数据分析代码这件事，它的核心难点以及大概的技术实现方案是什么？追问：如果你是产品的owner，设计这个AI自动生成SQL代码的场景，这款产品要解决的核心业务问题是什么，核心优势是什么？这款产品的主要用户你觉得会是谁？如果做这款AI生成SQL代码的工具，从技术角度和产品角度分别讲一下核心优势是什么？',
      answer: '参考答案要点：\n' +
        '**核心难点**：自然语言到SQL的语义理解、复杂查询的生成、多表关联、性能优化、用户意图澄清。\n' +
        '**技术方案**：基于大语言模型（如LLM）微调，结合数据库Schema信息，通过Prompt Engineering引导生成，辅以后端语法校验和执行计划优化。\n' +
        '**核心业务问题**：降低数据分析门槛，让业务人员能自助取数，减少对数据团队的依赖。\n' +
        '**核心优势**：\n' +
        '  - 技术：准确率高、支持复杂查询、实时响应；\n' +
        '  - 产品：交互自然、可解释性强、支持迭代反馈。\n' +
        '**主要用户**：业务分析师、运营人员、产品经理等非技术角色。\n' +
        '**技术角度优势**：模型可快速适配不同数据库方言，持续学习用户修正。\n' +
        '**产品角度优势**：提供可视化调试界面，让用户能验证和修正生成的SQL，建立信任。'
    },
    {
      id: 6,
      difficulty: 'Hard',

    });
  });

  return arr.sort((a,b)=>b.updatedAt-a.updatedAt);
}

/** -----------------------
 * 3) 渲染
 * ---------------------- */
function render(){
  const kw=kwEl.value.trim().toLowerCase(), diff=diffEl.value;
  const s=getSet(), rec=getRec(s.id);
  let data=[];

  if(currentTab==='all'||currentTab==='wrong'){
    data = s.questions.map(q=>({
      from:'set',
      setId:s.id, setTitle:s.titleZh, role:s.role,
      qid:q.id, title:q.title, answer:q.answer, difficulty:q.difficulty,
      status:rec[q.id]?.status||'none', attempts:rec[q.id]?.attempts||0
    }));
    if(currentTab==='wrong') data=data.filter(i=>i.status==='wrong');
  }else{
    data = allCrossWrong();
  }

  data = data.filter(i=>{
    const hitKw = !kw || i.title.toLowerCase().includes(kw) || i.setTitle.toLowerCase().includes(kw);
    const hitDiff = diff==='all' || i.difficulty===diff;
    return hitKw && hitDiff;
  });

  currentRender=data;

  if(!data.length){
    listEl.innerHTML='<div class="empty">暂无匹配题目</div>';
    refreshHeader();
    return;
  }

  listEl.innerHTML = data.map((i,idx)=>`
    <article class="item">
      <div>
        <h3 class="q-title">${idx+1}. ${i.title}</h3>
        <div class="meta">
          <span class="tag">${i.difficulty}</span>
          <span class="status ${stClass(i.status)}">${stText(i.status)}</span>
          <span>${i.setTitle}</span>
          <span>练习:${i.attempts||0}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn ghost sm" onclick="openByIndex(${idx})">查看</button>
        <button class="btn primary sm" onclick="openByIndex(${idx})">练习</button>
      </div>
    </article>
  `).join('');

  refreshHeader();
}

function openByIndex(i){
  const it=currentRender[i]; if(!it) return;
  currentQ=it;
  document.getElementById('qTitle').textContent = `${it.qid}. ${it.title}`;
  document.getElementById('qPrompt').textContent = it.title;
  document.getElementById('qAnswer').textContent = it.answer || '-';
  document.getElementById('drillHint').textContent = drillActive
    ? `再练模式进行中：剩余 ${drillQueue.length} 题`
    : '';
  document.getElementById('qMask').style.display='flex';
}

function closeQ(){
  document.getElementById('qMask').style.display='none';
  currentQ=null;
}

function mark(status){
  if(!currentQ) return;

  const rec=getRec(currentQ.setId), old=rec[currentQ.qid]||{attempts:0};
  rec[currentQ.qid]={
    status,
    attempts:(old.attempts||0)+1,
    updatedAt:Date.now(),
    question:{
      id:currentQ.qid,title:currentQ.title,answer:currentQ.answer,difficulty:currentQ.difficulty
    },
    set:{id:currentQ.setId,titleZh:currentQ.setTitle,role:currentQ.role}
  };
  setRec(currentQ.setId,rec);

  // 一键再练逻辑
  if(drillActive){
    const cur = drillQueue.shift();
    drillRounds++;

    // 答错/未掌握，放到队尾继续练
    if(status !== 'correct') drillQueue.push(cur);

    if(!drillQueue.length || drillRounds >= drillMaxRounds){
      drillActive=false;
      closeQ();
      render();
      alert('再练完成');
      return;
    }
    render();
    currentQ = drillQueue[0];
    document.getElementById('qTitle').textContent = `${currentQ.qid}. ${currentQ.title}`;
    document.getElementById('qPrompt').textContent = currentQ.title;
    document.getElementById('qAnswer').textContent = currentQ.answer || '-';
    document.getElementById('drillHint').textContent = `再练模式进行中：剩余 ${drillQueue.length} 题`;
    return;
  }

  closeQ();
  render();
}

function randomStart(){
  if(!currentRender.length){ alert('当前筛选下没有可练习题目'); return; }
  openByIndex(Math.floor(Math.random()*currentRender.length));
}

function drill(){
  if(!currentRender.length){ alert('当前筛选下没有可练习题目'); return; }
  drillActive = true;
  drillQueue = [...currentRender];
  drillRounds = 0;
  drillMaxRounds = Math.max(20, currentRender.length * 3); // 防无限循环
  currentQ = drillQueue[0];
  document.getElementById('qTitle').textContent = `${currentQ.qid}. ${currentQ.title}`;
  document.getElementById('qPrompt').textContent = currentQ.title;
  document.getElementById('qAnswer').textContent = currentQ.answer || '-';
  document.getElementById('drillHint').textContent = `再练模式进行中：剩余 ${drillQueue.length} 题`;
  document.getElementById('qMask').style.display='flex';
}

function clearSet(){
  if(!confirm('确认清空当前题集练习记录？')) return;
  localStorage.removeItem(keyOf(currentSetId));
  render();
}

/** -----------------------
 * 4) 事件 & 初始化
 * ---------------------- */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    currentTab=btn.dataset.tab;
    render();
  };
});
setSelect.onchange=e=>{ currentSetId=e.target.value; render(); };
kwEl.oninput=render;
diffEl.onchange=render;
document.getElementById('randomBtn').onclick=randomStart;
document.getElementById('drillBtn').onclick=drill;
document.getElementById('clearSetBtn').onclick=clearSet;
document.getElementById('qMask').addEventListener('click',e=>{ if(e.target.id==='qMask') closeQ(); });

// 主题
(function initTheme(){
  const btn = document.getElementById('themeBtn');
  const savedTheme=localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme', savedTheme);
  const syncText = ()=> btn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '浅色模式' : '深色模式';
  syncText();
  btn.onclick=()=>{
    const cur=document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', cur==='dark'?'light':'dark');
    localStorage.setItem('theme', document.documentElement.getAttribute('data-theme'));
    syncText();
  };
})();

(function init(){
  setSelect.innerHTML = sets.map(s=>`<option value="${s.id}">${s.titleZh}</option>`).join('');
  setSelect.value=currentSetId;
  render();
})();
</script>
</body>
